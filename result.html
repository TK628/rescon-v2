<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MISSION RESULT</title>
<link rel="stylesheet" href="./css/common.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/mode-base.css">
<link rel="stylesheet" href="./css/mode-result.css">
</head>
<body>
<div id="app">
<main id="mode-container" class="result-mode">
<section class="neon-card result-card" id="result-card">
<div class="result-header">
<div class="result-kicker">RESCON SYSTEM</div>
<div class="section-title result-title">任務結果</div>
<div class="result-subtitle">競技結果レポート</div>
</div>

<div class="result-meta">
<div class="result-meta-item">
<span>ROOM</span>
<strong id="result-room-name">ROOM</strong>
</div>
<div class="result-meta-item">
<span>DATE</span>
<strong id="result-date">----</strong>
</div>
</div>

<div class="result-score-grid" id="result-score-grid">
<div class="result-score-card"><div class="result-score-label">タイムスコア</div><div class="result-score-value" id="time-score">0</div></div>
<div class="result-score-card"><div class="result-score-label">タスクスコア</div><div class="result-score-value" id="task-score">0</div></div>
<div class="result-score-card"><div class="result-score-label">ストーブスコア</div><div class="result-score-value" id="stove-score">0</div></div>
<div class="result-score-card"><div class="result-score-label">報告スコア</div><div class="result-score-value" id="report-score">0</div></div>
<div class="result-score-card"><div class="result-score-label">救助スコア</div><div class="result-score-value" id="rescue-score">0</div></div>
</div>

<div class="result-total-panel">
<div class="result-total-label">合計スコア</div>
<div class="result-total-value" id="total-score">0</div>
</div>

<div class="result-actions" id="result-actions">
<button class="neon-button" id="btn-pdf-export">PDF EXPORT</button>
<button class="neon-button" id="btn-referee-setting">試合設定へ戻る</button>
<button class="neon-button" id="btn-home">HOME</button>
</div>
</section>
</main>
</div>
<script type="module" src="./js/result.js"></script>
</body>
</html>
