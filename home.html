<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESCON SYSTEM</title>

    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/home.css">
</head>

<body>

<div id="app">

    <main id="home-container">

        <section id="title-area">
            <h1 id="system-title">RESCON SYSTEM</h1>
            <div id="system-version">version 2.0.0</div>
        </section>

        <section class="neon-card" id="menu-card">
            <div class="section-title">MAIN MENU</div>

            <div id="menu-buttons">
                <button class="neon-button" id="btn-room">
                    ROOM SELECT
                </button>

                <button class="neon-button" id="btn-community">
                    COMMUNITY
                </button>

                <button class="neon-button" id="btn-manual">
                    MANUAL
                </button>

                <button class="neon-button" id="btn-updates">
                    UPDATES
                </button>
            </div>
        </section>

        <section class="neon-card" id="notice-card">
            <div class="section-title">NOTICE</div>
            <div class="notice-item">現在メンテナンス予定はありません。</div>
            <div class="notice-item">RESCON SYSTEM v2 再構築中。</div>
        </section>

    </main>

</div>

<script type="module" src="../js/home.js"></script>

</body>
</html>
