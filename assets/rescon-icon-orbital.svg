<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="RESCON Orbital Command Core">
<defs>
<radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#00ffff" stop-opacity=".45"/>
<stop offset="42%" stop-color="#00ffff" stop-opacity=".16"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0"/>
